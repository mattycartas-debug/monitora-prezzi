name: Monitora Prezzi Profumi

on:
  schedule:
    - cron: '0,30 * * * *'  # ogni mezz'ora, 24 ore su 24
  workflow_dispatch:          # permette di avviarlo manualmente con un click

jobs:
  monitora:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Carica prezzi salvati dalla cache
        uses: actions/cache@v4
        with:
          path: prezzi_salvati.json
          key: prezzi-cache-${{ github.run_id }}
          restore-keys: |
            prezzi-cache-

      - name: Esegui lo script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitora_prezzi.py

      - name: Salva prezzi aggiornati nella cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: prezzi_salvati.json
          key: prezzi-cache-${{ github.run_id }}
